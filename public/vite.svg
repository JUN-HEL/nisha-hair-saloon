<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Luxury Background -->
    <radialGradient id="bg" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#9b7084"/>
      <stop offset="100%" stop-color="#5a374b"/>
    </radialGradient>

    <!-- Gold Gradient -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8E7B5"/>
      <stop offset="40%" stop-color="#D9B37A"/>
      <stop offset="100%" stop-color="#B7864D"/>
    </linearGradient>

    <!-- Soft Shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="6"
        flood-color="#000" flood-opacity=".28"/>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="236" fill="url(#bg)"/>

  <!-- Gold Border -->
  <circle cx="256" cy="256" r="214"
          fill="none"
          stroke="url(#gold)"
          stroke-width="8"/>

  <!-- Decorative Ring -->
  <circle cx="256" cy="256" r="194"
          fill="none"
          stroke="#ffffff22"
          stroke-width="2"/>

  <!-- Hair Flow -->
  <path
    d="M170 205
       C170 120 340 115 340 205
       C340 255 285 290 255 340
       C228 290 170 255 170 205Z"
    fill="none"
    stroke="url(#gold)"
    stroke-width="7"
    stroke-linecap="round"/>

  <!-- Scissors -->
  <g transform="translate(256 265) rotate(-18)">
    <!-- Handles -->
    <circle cx="-32" cy="28" r="18"
            fill="none"
            stroke="url(#gold)"
            stroke-width="6"/>

    <circle cx="32" cy="28" r="18"
            fill="none"
            stroke="url(#gold)"
            stroke-width="6"/>

    <!-- Pivot -->
    <circle cx="0" cy="0" r="6"
            fill="url(#gold)"/>

    <!-- Blades -->
    <path d="M0 0 L-70 -78"
          stroke="url(#gold)"
          stroke-width="8"
          stroke-linecap="round"/>

    <path d="M0 0 L70 -78"
          stroke="url(#gold)"
          stroke-width="8"
          stroke-linecap="round"/>

    <!-- Arms -->
    <path d="M0 0 L-22 18"
          stroke="url(#gold)"
          stroke-width="7"
          stroke-linecap="round"/>

    <path d="M0 0 L22 18"
          stroke="url(#gold)"
          stroke-width="7"
          stroke-linecap="round"/>
  </g>

  <!-- Sparkles -->
  <g fill="url(#gold)">
    <path d="M125 145l6 18 18 6-18 6-6 18-6-18-18-6 18-6z"/>
    <path d="M382 135l5 15 15 5-15 5-5 15-5-15-15-5 15-5z"/>
    <path d="M385 365l4 12 12 4-12 4-4 12-4-12-12-4 12-4z"/>
  </g>

</svg>